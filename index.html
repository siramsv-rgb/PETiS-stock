<title>PETiS Stock v2</title>

<style>
:root{--bg:#0f1117;--sur:#1a1d27;--sur2:#22263a;--bdr:#2e3350;--acc:#4f8ef7;--grn:#2ecc8a;--yel:#f7c948;--red:#f7554f;--txt:#e8eaf6;--mut:#6b7099;--font:'Sarabun',sans-serif;--mono:'IBM Plex Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--txt);font-family:var(--font);min-height:100vh;overflow-x:hidden}
.sync-banner{display:flex;align-items:center;justify-content:center;gap:8px;padding:5px 16px;font-size:12px;font-weight:500}
.sync-banner.connecting{background:var(--sur);color:var(--mut)}
.sync-banner.live{background:rgba(46,204,138,.12);color:var(--grn)}
.sync-banner.error{background:rgba(247,85,79,.12);color:var(--red)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:currentColor}
.sync-banner.live .sync-dot{animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.topbar{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--bdr);padding:12px 14px 8px}
.topbar-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.logo{font-size:17px;font-weight:700;letter-spacing:1px;color:var(--acc)}
.logo span{color:var(--mut);font-weight:300}
.date-badge{font-family:var(--mono);font-size:11px;color:var(--mut);background:var(--sur2);padding:3px 8px;border-radius:6px}
.search-wrap{position:relative}
.search-wrap input{width:100%;background:var(--sur);border:1px solid var(--bdr);border-radius:10px;padding:9px 14px 9px 36px;color:var(--txt);font-family:var(--font);font-size:15px;outline:none}
.search-wrap input::placeholder{color:var(--mut)}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--mut);font-size:15px;pointer-events:none}
.tabs{display:flex;overflow-x:auto;gap:5px;padding:8px 14px;background:var(--bg);border-bottom:1px solid var(--bdr);scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;background:var(--sur);color:var(--mut);white-space:nowrap}
.tab.active{background:var(--acc);color:#fff}
.subtabs{display:flex;overflow-x:auto;gap:5px;padding:6px 14px;background:var(--bg);border-bottom:1px solid var(--bdr);scrollbar-width:none;display:none}
.subtabs.show{display:flex}
.subtabs::-webkit-scrollbar{display:none}
.subtab{flex-shrink:0;padding:4px 10px;border-radius:20px;font-size:11px;cursor:pointer;background:var(--sur2);color:var(--mut);white-space:nowrap}
.subtab.active{background:var(--acc2,#7c6af7);color:#fff}
.content{padding:10px 12px 100px}
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin:14px 0 6px}
.section-title{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--mut)}
.section-count{font-family:var(--mono);font-size:10px;color:var(--mut);background:var(--sur2);padding:2px 7px;border-radius:10px}
.card{background:var(--sur);border:1px solid var(--bdr);border-radius:12px;margin-bottom:7px;overflow:hidden;transition:border-color .2s}
.card.expanded{border-color:var(--acc)}
.card-hdr{display:flex;align-items:center;gap:9px;padding:11px 12px;cursor:pointer}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.dot.ok{background:var(--grn);box-shadow:0 0 5px var(--grn)}
.dot.low{background:var(--yel);box-shadow:0 0 5px var(--yel)}
.dot.out{background:var(--red);box-shadow:0 0 5px var(--red);animation:pulse 1.5s infinite}
.dot.expired{background:var(--mut)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.card-info{flex:1;min-width:0}
.drug-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.drug-meta{font-family:var(--mono);font-size:10px;color:var(--mut);margin-top:2px}
.saved-info{font-size:10px;color:var(--mut);margin-top:2px}
.last-check{font-size:10px;margin-top:2px}
.last-check.checked{color:#5ba0f7}
.last-check.never{color:var(--mut);font-style:italic}
.qty-badge{font-family:var(--mono);font-size:12px;font-weight:500;padding:3px 9px;border-radius:7px;flex-shrink:0}
.qty-badge.ok{background:rgba(46,204,138,.15);color:var(--grn)}
.qty-badge.low{background:rgba(247,201,72,.15);color:var(--yel)}
.qty-badge.out{background:rgba(247,85,79,.15);color:var(--red)}
.qty-badge.expired{background:rgba(107,112,153,.15);color:var(--mut)}
.edit-panel{display:none;padding:0 12px 12px;border-top:1px solid var(--bdr)}
.card.expanded .edit-panel{display:block}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.form-group{display:flex;flex-direction:column;gap:3px}
.form-group.full{grid-column:1/-1}
label{font-size:11px;color:var(--mut);font-weight:500}
input[type="number"],input[type="date"],select,textarea{background:var(--sur2);border:1px solid var(--bdr);border-radius:7px;padding:8px 10px;color:var(--txt);font-family:var(--font);font-size:13px;outline:none;width:100%;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--acc)}
select option{background:var(--sur2)}
textarea{resize:none;height:54px;font-size:12px}
.btn-save{margin-top:10px;width:100%;padding:10px;background:var(--acc);border:none;border-radius:9px;color:#fff;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer}
.btn-save.saving{background:var(--mut)}
.btn-save.saved{background:var(--grn)}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:var(--sur);border-top:1px solid var(--bdr);padding:10px 14px;display:flex;gap:7px;z-index:100}
.chip{flex:1;text-align:center;padding:7px 3px;background:var(--sur2);border-radius:9px}
.chip .num{font-family:var(--mono);font-size:17px;font-weight:500}
.chip .lbl{font-size:9px;color:var(--mut);margin-top:1px}
.chip.out .num{color:var(--red)}.chip.low .num{color:var(--yel)}.chip.ok .num{color:var(--grn)}.chip.exp .num{color:var(--mut)}
.checker-bar{display:flex;gap:7px;align-items:center;margin:8px 0 3px}
.checker-bar select{flex:1;font-size:12px;padding:7px 9px}
.checker-label{font-size:11px;color:var(--mut);flex-shrink:0}
.empty{text-align:center;padding:40px 20px;color:var(--mut);font-size:13px}
.loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:14px}
.loading-overlay.hidden{display:none}
.spinner{width:32px;height:32px;border:3px solid var(--bdr);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--mut)}
</style>

const CHECKERS=["EARN","TOEY","OIL","ICE","OAT","Game","Nook","หมวย","หญิง","บุ้ง","ครีม","เกรฟ","AP.","Mark","อาจารย์ศิราม"];
const SHEETS=["ทั้งหมด","⚠️ แจ้งเตือน","🕐 เกิน 7 วัน","Medicine","Diet","Injectable","Medical Supplies","Surgical","Lab","Lab IDEXX"];
// sub-categories per sheet
const SUBS={
  Medicine:[...new Set(DRUGS.filter(d=>d.sheet==="Medicine").map(d=>d.sub))],
  Diet:[...new Set(DRUGS.filter(d=>d.sheet==="Diet").map(d=>d.sub))],
  Injectable:[...new Set(DRUGS.filter(d=>d.sheet==="Injectable").map(d=>d.sub))],
  "Medical Supplies":[...new Set(DRUGS.filter(d=>d.sheet==="Medical Supplies").map(d=>d.sub))],
  Surgical:[...new Set(DRUGS.filter(d=>d.sheet==="Surgical").map(d=>d.sub))],
  Lab:["Lab ทั่วไป"],
  "Lab IDEXX":["IDEXX","GlinX"],
};
let fbState={},expandedId=null,activeSheet="ทั้งหมด",activeSub="",searchQ="";

onValue(stockRef,snap=>{
  fbState=snap.val()||{};
  document.getElementById("loadingOverlay").classList.add("hidden");
  setBanner("live","🟢 Real-time sync · ทุกคนเห็นข้อมูลเดียวกัน");
  render();
},()=>{
  setBanner("error","❌ เชื่อมต่อไม่ได้");
  document.getElementById("loadingOverlay").classList.add("hidden");
});

function setBanner(cls,text){const b=document.getElementById("syncBanner");b.className="sync-banner "+cls;document.getElementById("syncText").textContent=text;}
function getSt(d){return fbState[d.id]?.status||d.status;}
function getQty(d){return fbState[d.id]?.qty!==undefined?fbState[d.id].qty:d.qty;}
function dotCls(s){return({ok:"ok",low:"low",out:"out",order:"out",expired:"expired"})[s]||"ok";}

window.setSheet=id=>{activeSheet=id;activeSub="";expandedId=null;render();};
window.setSub=s=>{activeSub=activeSub===s?"":s;expandedId=null;render();};

function daysSinceCheck(id){
  const s=fbState[id];
  if(!s||!s.savedAt)return 9999;
  // savedAt format: "DD/MM/YY HH:MM"
  try{
    const [datePart,timePart]=s.savedAt.split(" ");
    const [dd,mm,yy]=datePart.split("/");
    const [hh,min]=timePart.split(":");
    const year=parseInt(yy)<100?2000+parseInt(yy):parseInt(yy);
    const d=new Date(year,parseInt(mm)-1,parseInt(dd),parseInt(hh),parseInt(min));
    const diffMs=Date.now()-d.getTime();
    return diffMs/(1000*60*60*24);
  }catch(e){return 9999;}
}
function filtered(){
  return DRUGS.filter(d=>{
    const st=getSt(d);
    if(activeSheet==="⚠️ แจ้งเตือน")return["out","low","expired","order"].includes(st);
    if(activeSheet==="🕐 เกิน 7 วัน")return daysSinceCheck(d.id)>7;
    if(activeSheet!=="ทั้งหมด"&&d.sheet!==activeSheet)return false;
    if(activeSub&&d.sub!==activeSub)return false;
    if(searchQ){const q=searchQ.toLowerCase();return d.name.toLowerCase().includes(q)||d.id.toLowerCase().includes(q)||d.company.toLowerCase().includes(q)||d.sub.toLowerCase().includes(q);}
    return true;
  });
}

function render(){
  // tabs
  document.getElementById("tabsBar").innerHTML=SHEETS.map(s=>`<div class="tab${activeSheet===s?" active":""}" onclick="setSheet('${s.replace(/'/g,"\\'")}')">${s}</div>`).join("");
  // subtabs
  const subBar=document.getElementById("subtabsBar");
  const subs=SUBS[activeSheet]||[];
  if(subs.length>1&&activeSheet!=="ทั้งหมด"&&activeSheet!=="⚠️ แจ้งเตือน"&&activeSheet!=="🕐 เกิน 7 วัน"&&!searchQ){
    subBar.className="subtabs show";
    subBar.innerHTML=subs.map(s=>`<div class="subtab${activeSub===s?" active":""}" onclick="setSub('${s.replace(/'/g,"\\'")}')">${s}</div>`).join("");
  }else{subBar.className="subtabs";}
  const drugs=filtered();
  const gc=localStorage.getItem("petis_checker")||"";
  const checkerBar=`<div class="checker-bar"><span class="checker-label">ผู้เช็ค:</span><select id="gc" onchange="localStorage.setItem('petis_checker',this.value)"><option value="">-- เลือกชื่อ --</option>${CHECKERS.map(c=>`<option value="${c}"${gc===c?" selected":""}>${c}</option>`).join("")}</select></div>`;
  if(!drugs.length){document.getElementById("mainContent").innerHTML=checkerBar+`<div class="empty">ไม่พบรายการ</div>`;updateSummary();return;}
  let html="";
  if(activeSheet==="⚠️ แจ้งเตือน"||activeSheet==="🕐 เกิน 7 วัน"||searchQ){html=drugs.map(cardHTML).join("");}
  else{
    const groups={};
    drugs.forEach(d=>{const g=activeSub?d.company||"-":d.sub||d.company||"-";if(!groups[g])groups[g]=[];groups[g].push(d);});
    for(const[g,list]of Object.entries(groups)){
      html+=`<div class="section-hdr"><div class="section-title">${g}</div><div class="section-count">${list.length}</div></div>`;
      html+=list.map(cardHTML).join("");
    }
  }
  document.getElementById("mainContent").innerHTML=checkerBar+html;
  updateSummary();
}

function cardHTML(d){
  const st=getSt(d),qty=getQty(d),s=fbState[d.id]||{},exp=expandedId===d.id;
  const days=daysSinceCheck(d.id);
  const daysLabel=days===9999?"":days<1?" (วันนี้)":days<2?" (เมื่อวาน)":`(${Math.floor(days)} วันที่แล้ว)`;
  const checkColor=days>7?"color:#f7554f":days>3?"color:#f7c948":"color:#5ba0f7";
  const savedInfo=s.savedAt?`<div class="last-check checked" style="${checkColor}">🕐 ${s.savedAt}${s.checker?" · "+s.checker:""}${daysLabel}</div>`:`<div class="last-check never">ยังไม่เคยเช็ค</div>`;
  const expStr=s.expiry||d.expiry||"";
  return`<div class="card${exp?" expanded":""}" id="card-${d.id}">
<div class="card-hdr" onclick="toggleCard('${d.id}')">
  <div class="dot ${dotCls(st)}"></div>
  <div class="card-info">
    <div class="drug-name">${d.name}</div>
    <div class="drug-meta">${d.id||"-"} · ${d.company||"-"} · ${d.sub}</div>
    ${savedInfo}
  </div>
  <div class="qty-badge ${dotCls(st)}">${qty===999?"เยอะ":qty} ${d.unit}</div>
</div>
<div class="edit-panel">
  <div class="form-row">
    <div class="form-group"><label>จำนวน (${d.unit||"-"})</label><input type="number" id="qty-${d.id}" value="${qty===999?0:qty}" min="0"></div>
    <div class="form-group"><label>สถานะ</label><select id="st-${d.id}"><option value="ok"${st==="ok"?" selected":""}>✅ ปกติ</option><option value="low"${st==="low"?" selected":""}>⚠️ ใกล้หมด</option><option value="out"${st==="out"?" selected":""}>🔴 หมด/สั่ง</option><option value="order"${st==="order"?" selected":""}>📦 รอสั่ง</option><option value="expired"${st==="expired"?" selected":""}>⛔ หมดอายุ</option></select></div>
    <div class="form-group"><label>วันหมดอายุ</label><input type="date" id="exp-${d.id}" value="${expStr.match(/^\d{4}-\d{2}-\d{2}$/)?expStr:""}"></div>
    <div class="form-group"><label>ผู้เช็ค</label><select id="chk-${d.id}"><option value="">-- เลือก --</option>${CHECKERS.map(c=>`<option value="${c}"${s.checker===c?" selected":""}>${c}</option>`).join("")}</select></div>
    <div class="form-group full"><label>หมายเหตุ</label><textarea id="note-${d.id}" placeholder="หมายเหตุ...">${s.note||""}</textarea></div>
  </div>
  <button class="btn-save" id="btn-${d.id}" onclick="saveDrug('${d.id}')">💾 บันทึก (sync ทุกคน)</button>
</div>
</div>`;
}

window.toggleCard=id=>{
  expandedId=expandedId===id?null:id;render();
  if(expandedId){
    const gc=localStorage.getItem("petis_checker")||"";
    const el=document.getElementById(`chk-${id}`);
    if(el&&gc&&!fbState[id]?.checker)el.value=gc;
    setTimeout(()=>document.getElementById(`card-${id}`)?.scrollIntoView({behavior:"smooth",block:"nearest"}),50);
  }
};

window.saveDrug=async id=>{
  const btn=document.getElementById(`btn-${id}`);
  btn.textContent="⏳ กำลัง sync...";btn.classList.add("saving");
  const now=new Date();
  const ts=now.toLocaleDateString("th-TH",{day:"2-digit",month:"2-digit",year:"2-digit"})+" "+now.toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit"});
  try{
    await update(ref(db,`stock/${id}`),{
      qty:parseInt(document.getElementById(`qty-${id}`)?.value)||0,
      status:document.getElementById(`st-${id}`)?.value||"ok",
      expiry:document.getElementById(`exp-${id}`)?.value||"",
      checker:document.getElementById(`chk-${id}`)?.value||"",
      note:document.getElementById(`note-${id}`)?.value||"",
      savedAt:ts,
    });
    expandedId=null;
  }catch(e){btn.textContent="❌ บันทึกไม่ได้";btn.classList.remove("saving");}
};

function updateSummary(){
  let out=0,low=0,ok=0,exp=0;
  DRUGS.forEach(d=>{const s=getSt(d);if(s==="out"||s==="order")out++;else if(s==="low")low++;else if(s==="expired")exp++;else ok++;});
  document.getElementById("cntOut").textContent=out;
  document.getElementById("cntLow").textContent=low;
  document.getElementById("cntOk").textContent=ok;
  document.getElementById("cntExp").textContent=exp;
}

document.getElementById("dateBadge").textContent=new Date().toLocaleDateString("th-TH",{day:"2-digit",month:"2-digit",year:"numeric"});
document.getElementById("searchInput").addEventListener("input",function(){searchQ=this.value.trim();expandedId=null;render();});
document.getElementById("tabsBar").innerHTML=SHEETS.map(s=>`<div class="tab${activeSheet===s?" active":""}" onclick="setSheet('${s.replace(/'/g,"\\'")}')">${s}</div>`).join("");
</script>
